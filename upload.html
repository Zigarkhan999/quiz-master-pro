<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload PDF</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
background:#007BFF;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>📄 Upload PDF</h1>

<p>Select your study PDF.</p>

<h2>Upload Questions</h2>

<input type="file" id="questionsFile" accept=".txt">

<h2>Upload Answers</h2>

<input type="file" id="answersFile" accept=".txt">

<button onclick="uploadFiles()">
Start Quiz
</button>

<br><br>

<button onclick="window.location.href='index.html'">

🏠 Back to Home

</button>

</div>
<script>
<script>

function uploadFiles(){

alert("Questions and Answers selected successfully!");

window.location.href="quiz.html";

}

</script>

<script>

async function uploadFiles(){

let qFile=document.getElementById("questionsFile").files[0];
let aFile=document.getElementById("answersFile").files[0];

if(!qFile || !aFile){
alert("Please select both files.");
return;
}

let questionsText=await qFile.text();
let answersText=await aFile.text();

localStorage.setItem("questionsText",questionsText);
localStorage.setItem("answersText",answersText);

window.location.href="quiz.html";

}

</script>
</script>
</body>

                           </html>
