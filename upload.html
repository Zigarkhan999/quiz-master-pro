<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Quiz Files</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>📄 Upload Quiz Files</h1>

<p>Select your Questions file and Answer Key.</p>

<h3>Questions File</h3>

<input
type="file"
id="questionsFile"
accept=".md,.txt,.pdf">

<h3>Answers File</h3>

<input
type="file"
id="answersFile"
accept=".md,.txt,.pdf">

<button onclick="uploadFiles()">
🚀 Start Quiz
</button>

<br><br>

<a href="index.html">
<button>
🏠 Back Home
</button>
</a>

</div>

<script>

async function uploadFiles(){

const qFile=document.getElementById("questionsFile").files[0];
const aFile=document.getElementById("answersFile").files[0];

if(!qFile){
alert("Please select the Questions file.");
return;
}

if(!aFile){
alert("Please select the Answers file.");
return;
}

const questionsText=await qFile.text();
const answersText=await aFile.text();

localStorage.setItem("questionsText",questionsText);
localStorage.setItem("answersText",answersText);

window.location.href="quiz.html";

}

</script>

</body>

</html>
