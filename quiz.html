<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Master Pro</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#007BFF;
}

#question{
font-size:22px;
margin:20px 0;
line-height:1.6;
}

#options button{
width:100%;
padding:14px;
margin:10px 0;
font-size:17px;
border:none;
border-radius:10px;
background:#007BFF;
color:white;
cursor:pointer;
}

#options button:hover{
background:#0056b3;
}

.info{
display:flex;
justify-content:space-between;
font-weight:bold;
margin:15px 0;
}

.progress{
width:100%;
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
}

#progressBar{
width:0%;
height:100%;
background:#28a745;
transition:.3s;
}

#message{
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Quiz Master Pro</h1>

<div class="progress">
<div id="progressBar"></div>
</div>

<div class="info">
<span id="questionNumber"></span>
<span>⏱ <span id="timer">60</span> sec</span>
</div>

<h2 id="question">
Loading...
</h2>

<div id="options"></div>

<p id="message"></p>

</div>

<script src="parser.js"></script>
<script src="script.js"></script>

</body>

</html>
