<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Master Pro</title>
<link rel="stylesheet" href="style.css">
<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#007BFF;
}

#question{
font-size:22px;
margin:20px 0;
}

button{
width:100%;
padding:14px;
margin:8px 0;
font-size:18px;
border:none;
border-radius:10px;
background:#007BFF;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.info{
display:flex;
justify-content:space-between;
font-weight:bold;
margin:15px 0;
}

</style>

</head>

<body>

<div class="container">

<h1>Quiz Master Pro</h1>

<div class="info">
<span>Question 1/3</span>
<span>⏱ <span id="timer">60</span> sec</span>
</div>

<h2 id="question">
What is the capital of Pakistan?
</h2>
<p id="message" style="font-size:20px;font-weight:bold;text-align:center;"></p>
<button>Islamabad</button>

<button>Lahore</button>

<button>Karachi</button>

<button>Quetta</button>

</div>
<script src="quiz-data.js"></script>
<script src="script.js"></script>
</body>
  </html>
