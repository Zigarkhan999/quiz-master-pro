<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#007BFF;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select{
width:100%;
padding:10px;
margin-top:5px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#007BFF;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>⚙️ Settings</h1>

<label>Quiz Timer</label>

<select>
<option>30 Seconds</option>
<option selected>60 Seconds</option>
<option>120 Seconds</option>
</select>

<label>Questions</label>

<select>
<option>10</option>
<option>20</option>
<option selected>50</option>
<option>100</option>
</select>

<button onclick="window.location.href='index.html'">
💾 Save & Back
</button>

</div>

</body>
  </html>
